name: Update sitemap lastmod

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - experience/**
      - projects/**
      - scripts/update-sitemap.py
      - .github/workflows/update-sitemap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate sitemap
        run: python scripts/update-sitemap.py

      - name: Commit sitemap changes
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "No sitemap changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap lastmod"
          git push
